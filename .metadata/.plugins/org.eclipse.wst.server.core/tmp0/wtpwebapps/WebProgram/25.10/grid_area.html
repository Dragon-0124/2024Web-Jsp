<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<title>grid</title>
<style>
	.container{
	width: 700px;
	display:grid;
	grid-template-rows:repeat(3,100px);
	grid-template-areas:
	"box1 box2 box2"
	"box1 box3 box4"
	"box5 box5 box5"
	;
	gap: 1rem;
	}
	
	.box{
	padding:15px;
	color: #fff;
	text-align:center;
	}
	
	.box1{
	background-color: #3689ff;
	grid-area: box1;
	}
	
	.box2{
	background-color: #00cf12;
	grid-area: box2;
	}
	
	.box3{
	background-color: #ff9019;
	grid-area: box3;
	}
	
	.box4{
	background-color: #ffd000;
	grid-area: box4;
	}
	
	.box5{
	background-color: #ff3f3f;
	grid-area: box5;
	}
	
</style>
</head>
<body>
	
	<div class="container">
		<div class="box box1">1</div>
		<div class="box box2">2</div>
		<div class="box box3">3</div>
		<div class="box box4">4</div>
		<div class="box box5">5</div>
	</div>
	
</body>
</html>
