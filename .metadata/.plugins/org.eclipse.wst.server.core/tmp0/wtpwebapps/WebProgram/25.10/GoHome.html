<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<title>grid</title>
<style>
	.gallary{
	width: 700px;
	margin: 20px auto;
	display:grid;
	grid-template-rows:repeat(3,100px);
	grid-template-areas:
	"photo1 photo1 photo2"
	"photo1 photo1 photo3"
	"photo4 photo5 photo6"
	;
	gap: 5px;
	}
	@media (max-width:768px){
	.gallary{
	width:768px;
	margin: 10px auto;
	display: block;
	}
	.item{
	height:200px;
	margin-bottom:10px
	}
	}
	
	@media (max-width:320px){
	.gallary{
	width:150px;
	margin: 10px auto;
	display: block;
	}
	.item{
	height:200px;
	margin-bottom:10px
	}
	}
	
	.gallary img{
	width:100%;
	height:100%;
	border-radius: 10px;
	object-fit:cover;
	}
	
	
	.photo1{
	grid-area: photo1;
	}
	
	.photo2{
	grid-area: photo2;
	}
	
	.photo3{
	grid-area: photo3;
	}
	
	.photo4{
	grid-area: photo4;
	}
	
	.photo5{
	grid-area: photo5;
	}
	.photo6{
	grid-area: photo6;
	}
	
</style>
</head>
<body>
	
	<div class="gallary">
		<img class="photo1" src="images/space/space1.jpg" alt="space">
		<img class="photo2" src="images/space/space2.jpg" alt="space">
		<img class="photo3" src="images/space/space3.jpg" alt="space">
		<img class="photo4" src="images/space/space4.jpg" alt="space">
		<img class="photo5" src="images/space/space5.jpg" alt="space">
		<img class="photo6" src="images/space/space6.jpg" alt="space">
	</div>
	
</body>
</html>
