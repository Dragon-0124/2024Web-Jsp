<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<title>grid</title>
<style>
	.gallery{
	width:700px;
	margin: 10px auto;
	display:grid;
	grid-template-rows:repeat(3,100px);
	grid-template-areas:
	"box1 box1 box1"
	"box2 box3 box3"
	"box2 box4 box5"
	;
	gap: 1rem;
	}
	.gallery img{
	width:100%;
	height:100%;
	border-radius: 10px;
	object-fit:cover;
	}
	
	.box1{
	grid-area: box1;
	}
	
	.box2{
	grid-area: box2;
	}
	
	.box3{
	grid-area: box3;
	}
	
	.box4{
	grid-area: box4;
	}
	
	.box5{
	grid-area: box5;
	}
	
	@media (max-width:768px){
	.gallery{
	width:400px;
	margin: 10px auto;
	display:grid;
	grid-template-rows:repeat(3,100px);
	grid-template-areas:
	"box1"
	"box2"	
	"box3"
	"box4"
	"box5"
	;
	gap: 1rem;
	}
	.gallery img{
	width:100%;
	height:100%;
	border-radius: 10px;
	object-fit:cover;
	gap: 1rem;
	}
	
	}
</style>
</head>
<body>
	
	<div class="gallery">
		<img class="box1" src="images/space/space1.jpg" alt="space">
		<img class="box2" src="images/space/space2.jpg" alt="space">
		<img class="box3" src="images/space/space3.jpg" alt="space">
		<img class="box4" src="images/space/space4.jpg" alt="space">
		<img class="box5" src="images/space/space5.jpg" alt="space">
	</div>
	
</body>
</html>
