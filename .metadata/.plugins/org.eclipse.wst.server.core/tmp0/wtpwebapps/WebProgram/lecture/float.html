<html>
<head>
<meta charset="UTF-8">
<title>CSS Display 속성</title>
<style>
	.wrapper{
	width: 800px;
  	padding: 12px;
	border: 1px solid #ccc;
  	margin: 10px auto;;
	}
	.box {
		padding:20px;
		margin:10px;
	}
	#box1{
	background:#ffd800;
	float:left;
	}
	#box2{
	background:#0094ff;
	float:right;
	}
	
</style>
</head>
<body>
	<div class="wrapper">
		<div class="box" id="box1">박스1</div>
		<div class="box" id="box2">박스2</div>
		<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.
		 Suspendisse euismod molestie pellentesque.
		 Fusce et metus neque. Pellentesque nec nisi nisi.</p>
		
	</div>
</body>
</html>
