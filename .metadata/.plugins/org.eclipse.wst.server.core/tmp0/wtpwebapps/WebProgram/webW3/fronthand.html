<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
	<meta charset="utf-8">
	<title>연습 문제2</title>
	<style>
		#container{
			width:520px;
			border:1px solid break;
			padding:20px 40px;
			margin:0 auto;
		}
		fieldset {margin-bottom:15px;}
		legend {font-weight:bold;}
			ul {list-style-type:none;}
			li {line-height:30px;}
	</style>
</head>
<body>
<div id="container">
<form>
	<fieldset>
		<h1>프런트엔드 개발자 지원서</h1>
		<p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
		<hr>
	
		<h4>개인 정보</h4>
		<ul>
			<li>
				<label>이름 <input type="text" name="name" placeholder="공백 없이 입력하세요."></label>
			</li>
			<li>
				<label>연락처 <input type="tel" name="phone" maxlength="11"></label>
			</li>
		</ul>
		
		<h4>지원 분야</h4>
		<ul>
			<li>
				<label><input type="radio" name="apply" value="web_pub">웹 퍼블리싱</label>
			</li>
			<li>
				<label><input type="radio" name="apply" value="web_dev" >웹 애플리케이션 개발</label>
			</li>
			<li>
				<label><input type="radio" name="apply" value="env_ref" >개발 환경 개선</label>
			</li>
		</ul>
		<h4>지원 동기</h4>	
		<p> <textarea name="comment" cols="60" rows="5" placeholder="본사 지원 동기를 간단히 써 주세요."></textarea></p>
		<button type="submit">접수하기</button>
		<button type="reset">다시쓰기</button>
	</fieldset>
</form>
</div>
</body>
</html>
