<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Click-Change</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
</style>
</head>
<body>
    <div class="container">
        <img src="images/kitty-1.png" id="cat">
    </div>

    <script>
        let cat = document.querySelector("#cat");
        cat.onclick = changePic;

        function changePic() {
            cat.src = "images/kitty-2.png";
        }
    </script>
</body>
</html>
